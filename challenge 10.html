    <style>
      body {
        background-color: RGBA(136, 93, 241, 0.1);
      }

      h1 {
        color: RGB(136, 93, 241);
        font-size: 48px;
        font-weight: bold;
        text-align: center;
      }
      h2 {
        color: black;
        text-align: center;
        font-size: 48px;
        font-weight: lighter;
      }
      ul {
        list-style-type: none;
        text-align: center;
        padding: 0%;
        word-spacing: 40px;
        font-size: 30px;
        font-weight: lighter;
      }
      a {
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      button {
        margin: 0 auto;
        padding: 15px 20px;
        color: white;
        display: block;
        background: blueviolet;
        border-radius: 30px;
        border: 1px solid blueviolet;
        transition: all 200ms ease-in-out;
        font-size: 20px;
      }
      button:hover {
        background: white;
        color: blueviolet;
        cursor: pointer;
      }
      p {
        text-align: center;
      }
      img {
        width: 450px;
        display: block;
        margin: 0 auto;
      }
      .link1 {
        color: blue;
        text-decoration-line: none;
      }
      .link2 {
        color: red;
        text-decoration-line: none;
      }
      .link3 {
        color: green;
        text-decoration-line: none;
      }
      .social {
        color: blueviolet;
      }
      .address {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .address span {
        display: inline-block;
      }
    </style>
  </head>
